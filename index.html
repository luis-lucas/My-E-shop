<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Merienda:wght@300..900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>
<body>
    <header>
        <div class="banner">
            <span class="emoji">🍜</span>
            <h4 class="promo-banner">Free delivery on orders over £20</h4>
            <span class="emoji">🍜</span>
            <button class="close-banner">x</button>
        </div>
                <nav id="nav-menu" class="nav-container">
                    <div class="top-bar">
                        <h3 class="logo">The Noodle Shop</h3>  
                        <button class="menu-toggle">
                            <span class="line-top"></span>
                            <span class="line-middle"></span>
                            <span class="line-bottom"></span>
                        </button>
                    </div>
                    
                        <ul class="links-nav">
                            <li class="nav-link"><a href="#">Shop</a></li>
                            <li class="nav-link"><a href="#">Info</a></li>
                            <li class="nav-link"><a href="#">About us</a></li>
                        </ul>
                </nav>
    </header>
                    <section class="hero">
                        <h1 class="hero-title">
                        
                        </h1>
                        <p class="hero-sub-title">
                        We Love Noodles
                        </p>
                        <button class="hero-button">
                        Get Noodles
                        </button>
                    </section>
                        <section class="product" id="product-list">
                                <div class="card">
                                    <img src="E-shop-img/logo.png" alt="noodle bowl">
                                    <h4>Japan Noodles</h4>
                                    <p>$10</p>
                                    <button class="add-to-cart">Add to cart</button>
                                </div>
                                        <div class="card">
                                            <img src="E-shop-img/logo.png" alt="noodle bowl">
                                            <h4>Japan Noodles</h4>
                                            <p>$10</p>
                                            <button class="add-to-cart">Add to cart</button>
                                        </div>

                                <div class="card">
                                    <img src="E-shop-img/logo.png" alt="noodle bowl">
                                    <h4>Japan Noodles</h4>
                                    <p>$10</p>
                                    <button class="add-to-cart">Add to cart</button>
                                </div>
                        </section>  

            <section class="testimonial">
                    <button class="prev-button"><b>←</b></button>
                <div class="review-card">
                    <img class="review-img" src="E-shop-img/001.png" alt="bowl of Noodles">
                    <h4 class="review"></h4>
                    <p class="review-text"></p>
                    <span class="star">⭐ ⭐ ⭐ ⭐ ⭐ </span>
                </div>
                <div class="review-card hide-mobile">
                    <img class="review-img" src="E-shop-img/002.png" alt="bowl of Noodles">
                    <h4 class="review"></h4>
                    <p class="review-text"></p>
                    <span class="star">☆☆☆☆☆ </span>
                </div>
                <div class="review-card hide-mobile" >
                    <img class="review-img" src="E-shop-img/003.png" alt="bowl of Noodles">
                    <h4 class="review"></h4>
                    <p class="review-text"></p>
                    <span class="star">☆☆☆☆☆</span>
                </div>
                    <button class="next-button"><b>→</b></button>       
            </section> 

                <footer>
                    <h3 class="footer-logo">The Noodle Shop</h3>
                            <ul class="links-footer">
                                <li class="footer-link"><a href="#">Shop</a></li>
                                <li class="footer-link"><a href="#">Info</a></li>
                                <li class="footer-link"><a href="#">About us</a></li>
                            </ul>
                    <div class="icons-footer">        
                        <i class="fab fa-instagram"></i>
                        <i class="fab fa-facebook"></i>
                        <i class="fab fa-tiktok"></i>
                    </div>    
                        <p class="copyright">© 2025 The Noodle Shop</p>
                </footer> 
                        <button class="back-to-top">Back To The Top</button>          
   <script src="main.js" >
   </script>
</body>
</html>
